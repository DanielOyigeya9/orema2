<script>
// ==================== GLOBAL STATE & ROUTER ====================
let db = null;
let currentPage = 'home';
let adminLoggedIn = false;
let adminUser = null;

// Hash routing
window.addEventListener('hashchange', router);
window.addEventListener('load', async () => {
  showLoading(true);
  await initDatabase();
  setupNavigation();
  router();
  showLoading(false);
});

function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
}

function router() {
  const hash = window.location.hash.slice(1) || '/home';
  const [path, queryString] = hash.split('?');
  const params = new URLSearchParams(queryString || '');
  
  // Hide all pages
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  
  if (path === '/home' || path === '/') {
    document.getElementById('homePage').classList.add('active');
    loadHomePage();
  } else if (path === '/listings') {
    document.getElementById('listingsPage').classList.add('active');
    loadListingsPage(params);
  } else if (path === '/listing') {
    document.getElementById('listingDetailPage').classList.add('active');
    loadListingDetail(params.get('id'));
  } else if (path === '/services') {
    document.getElementById('servicesPage').classList.add('active');
    loadServicesPage();
  } else if (path === '/contact') {
    document.getElementById('contactPage').classList.add('active');
    loadContactPage();
  } else if (path === '/admin') {
    document.getElementById('adminPage').classList.add('active');
    loadAdminPage();
  } else {
    document.getElementById('homePage').classList.add('active');
    loadHomePage();
  }
  currentPage = path;
}

function setupNavigation() {
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', (e) => {
      document.getElementById('mobileMenu').classList.add('hidden');
    });
  });
  document.getElementById('mobileMenuBtn').addEventListener('click', () => {
    document.getElementById('mobileMenu').classList.toggle('hidden');
  });
}

// ==================== DATABASE SETUP (sql.js) ====================
async function initDatabase() {
  const SQL = await initSqlJs({
    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
  });
  
  // Try to load from localStorage
  const saved = localStorage.getItem('oremaglobal_db');
  if (saved) {
    const uint8 = new Uint8Array(JSON.parse(saved));
    db = new SQL.Database(uint8);
  } else {
    db = new SQL.Database();
    createSchema();
    maybeMigrateOldData();
    saveDatabase();
  }
}

function createSchema() {
  db.run(`CREATE TABLE IF NOT EXISTS listings (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    category TEXT NOT NULL,
    title TEXT NOT NULL,
    description TEXT,
    price REAL,
    location TEXT,
    status TEXT DEFAULT 'available',
    is_featured INTEGER DEFAULT 0,
    details TEXT,
    created_at TEXT DEFAULT (datetime('now'))
  )`);
  db.run(`CREATE TABLE IF NOT EXISTS listing_images (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    listing_id INTEGER,
    image_data TEXT,
    sort_order INTEGER,
    FOREIGN KEY (listing_id) REFERENCES listings(id) ON DELETE CASCADE
  )`);
  db.run(`CREATE TABLE IF NOT EXISTS services (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    title TEXT,
    description TEXT,
    icon TEXT,
    content TEXT
  )`);
  db.run(`CREATE TABLE IF NOT EXISTS inquiries (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    listing_id INTEGER,
    name TEXT,
    email TEXT,
    phone TEXT,
    message TEXT,
    created_at TEXT DEFAULT (datetime('now'))
  )`);
  db.run(`CREATE TABLE IF NOT EXISTS users (
    id INTEGER PRIMARY KEY AUTOINCREMENT,
    username TEXT UNIQUE,
    password_hash TEXT
  )`);
  // Insert default admin if not exists
  const adminExists = db.exec("SELECT id FROM users WHERE username='admin'");
  if (adminExists.length === 0 || adminExists[0].values.length === 0) {
    const hash = simpleHash('admin123');
    db.run("INSERT INTO users (username, password_hash) VALUES (?, ?)", ['admin', hash]);
  }
}

function simpleHash(str) {
  // Use SubtleCrypto when available, otherwise fallback to simple hash
  if (window.crypto && window.crypto.subtle) {
    // This is async, so we need to handle it specially; for simplicity we'll use a basic hash
    // Since we need synchronous for sql.js init, we'll use a basic implementation
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      const char = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + char;
      hash |= 0;
    }
    return 'sha256_' + Math.abs(hash).toString(16);
  }
  return 'simple_' + btoa(str);
}

function verifyPassword(input, hash) {
  return simpleHash(input) === hash;
}

function saveDatabase() {
  if (!db) return;
  const uint8 = db.export();
  const arr = Array.from(uint8);
  localStorage.setItem('oremaglobal_db', JSON.stringify(arr));
}

function executeQuery(sql, params = []) {
  try {
    const results = db.exec(sql, params);
    if (results.length === 0) return [];
    const columns = results[0].columns;
    const values = results[0].values;
    return values.map(row => {
      const obj = {};
      columns.forEach((col, i) => obj[col] = row[i]);
      return obj;
    });
  } catch (e) {
    console.error('DB error:', e);
    return [];
  }
}

// ==================== HOME PAGE ====================

    properties: executeQuery("SELECT COUNT(*) as cnt FROM listings WHERE category IN ('land','house','estate')")[0].cnt,

  document.getElementById('homeContent').innerHTML = `

      <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 mb-4">Welcome to Orema Global</h1>
      <p class="text-lg text-gray-600 max-w-2xl mx-auto">Your trusted partner in real estate and auto sales. We offer lands, houses, estates, vehicles, land surveying, and full property management services.</p>
      <div class="mt-6 flex justify-center gap-4">
        <a href="#/listings" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-full transition">View Listings</a>

      </div>
    </section>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
      <div class="bg-white p-4 rounded-xl shadow"><span class="text-2xl font-bold text-emerald-600">${stats.properties}+</span><p class="text-gray-500">Properties</p></div>

      <h3 class="text-2xl font-bold mb-4">Featured Listings</h3>

function renderFeatured(listings) {
  const grid = document.getElementById('featuredGrid');
  if (!grid) return;
  grid.innerHTML = listings.map(l => {
    const img = getFirstImage(l.id);
    return `<div class="bg-white rounded-xl shadow overflow-hidden cursor-pointer" onclick="window.location.href='#/listing?id=${l.id}'">
      <img src="${img || 'https://via.placeholder.com/400x250'}" class="w-full h-48 object-cover" alt="${l.title}">
      <div class="p-4"><span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded">${l.category.toUpperCase()}</span>
      <h4 class="font-semibold mt-2">${l.title}</h4><p class="text-emerald-600 font-bold">₦${Number(l.price).toLocaleString()}</p>
      <p class="text-gray-500 text-sm">${l.location}</p></div>
    </div>`;
  }).join('');
}

function getFirstImage(listingId) {
  const imgs = executeQuery("SELECT image_data FROM listing_images WHERE listing_id=? ORDER BY sort_order LIMIT 1", [listingId]);
  return imgs.length ? imgs[0].image_data : null;
}

function renderServicesPreview(services) {
  const cont = document.getElementById('servicesPreview');
  if (!cont) return;
  cont.innerHTML = services.map(s => `
    <div class="bg-white p-4 rounded-xl shadow text-center">
      <div class="text-4xl">${s.icon || '🔧'}</div><h4 class="font-semibold mt-2">${s.title}</h4>
      <p class="text-sm text-gray-500">${s.description}</p>
    </div>`).join('');
}

// ==================== LISTINGS PAGE ====================
let listingFilters = { category: '', minPrice: '', maxPrice: '', location: '', status: 'available' };
let currentListingPage = 1;
const perPage = 6;

function loadListingsPage(params) {
  listingFilters.category = params.get('category') || '';
  listingFilters.minPrice = params.get('min') || '';
  listingFilters.maxPrice = params.get('max') || '';
  listingFilters.location = params.get('location') || '';
  listingFilters.status = params.get('status') || 'available';
  currentListingPage = parseInt(params.get('page')) || 1;
  renderListingFilters();
  fetchAndRenderListings();
}

function renderListingFilters() {
  document.getElementById('listingFilters').innerHTML = `
    <select id="filterCategory" class="border rounded p-2"><option value="">All Categories</option><option value="land">Land</option><option value="house">Houses</option><option value="estate">Estates</option><option value="car">Vehicles</option></select>
    <input type="number" id="filterMinPrice" placeholder="Min Price" class="border rounded p-2 w-28" value="${listingFilters.minPrice}">
    <input type="number" id="filterMaxPrice" placeholder="Max Price" class="border rounded p-2 w-28" value="${listingFilters.maxPrice}">
    <input type="text" id="filterLocation" placeholder="Location" class="border rounded p-2 w-36" value="${listingFilters.location}">
    <select id="filterStatus" class="border rounded p-2"><option value="available">Available</option><option value="sold">Sold</option><option value="">All Status</option></select>
    <button onclick="applyFilters()" class="bg-emerald-500 text-white px-4 py-2 rounded hover:bg-emerald-600">Apply</button>
  `;
  document.getElementById('filterCategory').value = listingFilters.category;
  document.getElementById('filterStatus').value = listingFilters.status;
}

function applyFilters() {
  listingFilters.category = document.getElementById('filterCategory').value;
  listingFilters.minPrice = document.getElementById('filterMinPrice').value;
  listingFilters.maxPrice = document.getElementById('filterMaxPrice').value;
  listingFilters.location = document.getElementById('filterLocation').value;
  listingFilters.status = document.getElementById('filterStatus').value;
  currentListingPage = 1;
  fetchAndRenderListings();
  // Update URL hash
  const params = new URLSearchParams();
  if (listingFilters.category) params.set('category', listingFilters.category);
  if (listingFilters.minPrice) params.set('min', listingFilters.minPrice);
  if (listingFilters.maxPrice) params.set('max', listingFilters.maxPrice);
  if (listingFilters.location) params.set('location', listingFilters.location);
  if (listingFilters.status !== 'available') params.set('status', listingFilters.status);
  window.location.hash = `/listings?${params.toString()}`;
}

function fetchAndRenderListings() {
  let where = "WHERE 1=1";
  const params = [];
  if (listingFilters.category) { where += " AND category=?"; params.push(listingFilters.category); }
  if (listingFilters.minPrice) { where += " AND price >= ?"; params.push(Number(listingFilters.minPrice)); }
  if (listingFilters.maxPrice) { where += " AND price <= ?"; params.push(Number(listingFilters.maxPrice)); }
  if (listingFilters.location) { where += " AND location LIKE ?"; params.push(`%${listingFilters.location}%`); }
  if (listingFilters.status) { where += " AND status=?"; params.push(listingFilters.status); }

  const countRow = executeQuery(`SELECT COUNT(*) as cnt FROM listings ${where}`, params);
  const total = countRow[0].cnt;
  const totalPages = Math.ceil(total / perPage);
  const offset = (currentListingPage - 1) * perPage;

  const listings = executeQuery(`SELECT * FROM listings ${where} ORDER BY created_at DESC LIMIT ? OFFSET ?`, [...params, perPage, offset]);

  const grid = document.getElementById('listingGrid');
  grid.innerHTML = listings.map(l => {
    const img = getFirstImage(l.id);
    return `<div class="bg-white rounded-xl shadow overflow-hidden cursor-pointer" onclick="window.location.href='#/listing?id=${l.id}'">
      <img src="${img || 'https://via.placeholder.com/400x250'}" class="w-full h-48 object-cover" alt="${l.title}">
      <div class="p-4"><span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded">${l.category.toUpperCase()}</span>
      <h4 class="font-semibold mt-2">${l.title}</h4><p class="text-emerald-600 font-bold">₦${Number(l.price).toLocaleString()}</p>
      <p class="text-gray-500 text-sm">${l.location}</p>
      <span class="text-xs ${l.status==='sold'?'text-red-500':'text-green-600'}">${l.status}</span></div>
    </div>`;
  }).join('');

  const pagDiv = document.getElementById('listingPagination');
  pagDiv.innerHTML = '';
  for (let i = 1; i <= totalPages; i++) {
    pagDiv.innerHTML += `<button onclick="goToListingPage(${i})" class="px-3 py-1 rounded ${i===currentListingPage?'bg-emerald-500 text-white':'bg-gray-200'}">${i}</button>`;
  }
}

function goToListingPage(page) {
  currentListingPage = page;
  const params = new URLSearchParams(window.location.hash.split('?')[1] || '');
  params.set('page', page);
  window.location.hash = `/listings?${params.toString()}`;
  fetchAndRenderListings();
}

  const images = executeQuery("SELECT * FROM listing_images WHERE listing_id=? ORDER BY sort_order", [id]);
  const detailsObj = JSON.parse(listing.details || '{}');
  const detailKeys = Object.keys(detailsObj);
  document.getElementById('detailContent').innerHTML = `
    <button onclick="history.back()" class="text-emerald-600 mb-4">&larr; Back</button>
    <div class="grid md:grid-cols-2 gap-8">
      <div>
        <img id="mainImage" src="${images.length ? images[0].image_data : 'https://via.placeholder.com/600x400'}" class="w-full h-80 object-cover rounded-xl">
        <div class="flex mt-2 space-x-2">${images.map((img,i) => `<img src="${img.image_data}" class="gallery-thumb w-16 h-16 object-cover rounded ${i===0?'ring-2 ring-emerald-500':''}" onclick="document.getElementById('mainImage').src='${img.image_data}'; this.parentElement.querySelectorAll('img').forEach(t=>t.classList.remove('ring-2','ring-emerald-500')); this.classList.add('ring-2','ring-emerald-500')">`).join('')}</div>
      </div>
      <div>
        <span class="text-sm bg-emerald-100 text-emerald-700 px-2 py-1 rounded">${listing.category.toUpperCase()}</span>
        <h2 class="text-3xl font-bold mt-2">${listing.title}</h2>
        <p class="text-2xl text-emerald-600 font-bold mt-2">₦${Number(listing.price).toLocaleString()}</p>
        <p class="text-gray-600">${listing.location}</p>
        <p class="mt-4">${listing.description}</p>
        ${detailKeys.length ? `<div class="mt-4"><h4 class="font-semibold">Specifications</h4><table class="w-full text-sm">${detailKeys.map(k => `<tr><td class="pr-4 py-1 font-medium">${k}</td><td>${detailsObj[k]}</td></tr>`).join('')}</table></div>` : ''}
        <div class="mt-6 bg-gray-50 p-4 rounded-xl">
          <h4 class="font-semibold mb-2">Inquire about this ${listing.category}</h4>
          <input id="inqName" placeholder="Your Name" class="w-full border p-2 rounded mb-2">
          <input id="inqEmail" placeholder="Email" class="w-full border p-2 rounded mb-2">
          <input id="inqPhone" placeholder="Phone" class="w-full border p-2 rounded mb-2">
          <textarea id="inqMessage" placeholder="Message" class="w-full border p-2 rounded mb-2"></textarea>
          <button onclick="submitInquiry(${listing.id})" class="bg-emerald-500 text-white px-4 py-2 rounded hover:bg-emerald-600">Send Inquiry</button>
        </div>
      </div>
    </div>
  `;
}

function submitInquiry(listingId) {
  const name = document.getElementById('inqName').value.trim();
  const email = document.getElementById('inqEmail').value.trim();
  const phone = document.getElementById('inqPhone').value.trim();
  const message = document.getElementById('inqMessage').value.trim();
  if (!name || !email || !message) { alert('Please fill name, email and message'); return; }
  db.run("INSERT INTO inquiries (listing_id, name, email, phone, message) VALUES (?,?,?,?,?)", [listingId, name, email, phone, message]);
  saveDatabase();
  alert('Inquiry sent! We will get back to you.');
  document.getElementById('inqName').value = '';
  document.getElementById('inqEmail').value = '';
  document.getElementById('inqPhone').value = '';
  document.getElementById('inqMessage').value = '';
}

// ==================== ADMIN PANEL ====================
function loadAdminPage() {
  if (!adminLoggedIn) {
    document.getElementById('adminContainer').innerHTML = `
      <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow mt-10">
        <h2 class="text-2xl font-bold mb-4">Admin Login</h2>
        <input id="adminUsername" placeholder="Username" class="w-full border p-2 rounded mb-2" value="admin">
        <input id="adminPassword" type="password" placeholder="Password" class="w-full border p-2 rounded mb-2">
        <button onclick="adminLogin()" class="w-full bg-emerald-500 text-white py-2 rounded hover:bg-emerald-600">Login</button>
      </div>`;
  } else {
    renderAdminDashboard();
  }
}

function adminLogin() {
  const username = document.getElementById('adminUsername').value.trim();
  const password = document.getElementById('adminPassword').value;
  const user = executeQuery("SELECT * FROM users WHERE username=?", [username])[0];
  if (user && verifyPassword(password, user.password_hash)) {
    adminLoggedIn = true;
    adminUser = user;
    renderAdminDashboard();
  } else {
    alert('Invalid credentials');
  }
}

function renderAdminDashboard() {
  const totalListings = executeQuery("SELECT COUNT(*) as cnt FROM listings")[0].cnt;
  const inquiries = executeQuery("SELECT COUNT(*) as cnt FROM inquiries")[0].cnt;
  document.getElementById('adminContainer').innerHTML = `
    <div class="w-full md:w-64 bg-white shadow rounded-xl p-4 admin-sidebar">
      <h3 class="font-bold text-lg mb-4">Admin Panel</h3>
      <a href="#" onclick="showAdminSection('listings')" class="block py-2 px-3 rounded hover:bg-emerald-50 mb-1">📋 Manage Listings</a>
      <a href="#" onclick="showAdminSection('inquiries')" class="block py-2 px-3 rounded hover:bg-emerald-50 mb-1">📩 Inquiries</a>
      <a href="#" onclick="exportDatabase()" class="block py-2 px-3 rounded hover:bg-emerald-50 mb-1">💾 Export DB</a>
      <a href="#" onclick="adminLogout()" class="block py-2 px-3 rounded hover:bg-red-50 text-red-600">🚪 Logout</a>
    </div>
    <div class="flex-1 bg-white rounded-xl shadow p-6" id="adminContentArea">
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-emerald-50 p-4 rounded"><span class="text-2xl font-bold">${totalListings}</span><p>Total Listings</p></div>
        <div class="bg-blue-50 p-4 rounded"><span class="text-2xl font-bold">${inquiries}</span><p>Inquiries</p></div>
      </div>
      <p>Select a section from the sidebar.</p>
    </div>`;
  window.currentAdminSection = 'listings';
  showAdminSection('listings');
}

function showAdminSection(section) {
  window.currentAdminSection = section;
  const area = document.getElementById('adminContentArea');
  if (!area) return;
  if (section === 'listings') {
    const listings = executeQuery("SELECT * FROM listings ORDER BY created_at DESC");
    area.innerHTML = `<h3 class="text-xl font-bold mb-4">All Listings</h3>
    <button onclick="openListingForm()" class="mb-4 bg-emerald-500 text-white px-4 py-2 rounded">+ Add New Listing</button>
    <div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="bg-gray-100"><th>ID</th><th>Title</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${listings.map(l => `<tr><td>${l.id}</td><td>${l.title}</td><td>${l.category}</td><td>₦${Number(l.price).toLocaleString()}</td><td>${l.status}</td>
    <td><button onclick="editListing(${l.id})" class="text-blue-600 mr-2">Edit</button><button onclick="deleteListing(${l.id})" class="text-red-600">Del</button></td></tr>`).join('')}</tbody></table></div>`;
  } else if (section === 'inquiries') {
    const inqs = executeQuery("SELECT * FROM inquiries ORDER BY created_at DESC");
    area.innerHTML = `<h3 class="text-xl font-bold mb-4">Inquiries</h3>
    <div class="space-y-4">${inqs.map(i => `<div class="border p-3 rounded"><p><strong>${i.name}</strong> (${i.email})</p><p>${i.message}</p><small>${i.created_at}</small></div>`).join('')}</div>`;
  }
}

function openListingForm(listing = null) {
  const isEdit = !!listing;
  const title = isEdit ? 'Edit Listing' : 'Add New Listing';
  const formHtml = `
    <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" id="listingFormOverlay">
      <div class="bg-white rounded-xl p-6 max-w-2xl w-full max-h-screen overflow-y-auto">
        <h2 class="text-2xl font-bold mb-4">${title}</h2>
        <input id="lfTitle" placeholder="Title" class="w-full border p-2 rounded mb-2" value="${isEdit ? listing.title : ''}">
        <select id="lfCategory" class="w-full border p-2 rounded mb-2" onchange="toggleDetailFields()">
          <option value="land" ${isEdit && listing.category==='land'?'selected':''}>Land</option>
          <option value="house" ${isEdit && listing.category==='house'?'selected':''}>House</option>
          <option value="estate" ${isEdit && listing.category==='estate'?'selected':''}>Estate</option>
          <option value="car" ${isEdit && listing.category==='car'?'selected':''}>Vehicle</option>
        </select>
        <textarea id="lfDescription" placeholder="Description" class="w-full border p-2 rounded mb-2">${isEdit ? listing.description : ''}</textarea>
        <input id="lfPrice" type="number" placeholder="Price" class="w-full border p-2 rounded mb-2" value="${isEdit ? listing.price : ''}">
        <input id="lfLocation" placeholder="Location" class="w-full border p-2 rounded mb-2" value="${isEdit ? listing.location : ''}">
        <select id="lfStatus" class="w-full border p-2 rounded mb-2">
          <option value="available" ${isEdit && listing.status==='available'?'selected':''}>Available</option>
          <option value="sold" ${isEdit && listing.status==='sold'?'selected':''}>Sold</option>
        </select>
        <label class="flex items-center mb-2"><input type="checkbox" id="lfFeatured" ${isEdit && listing.is_featured?'checked':''}> Featured listing</label>
        <div id="dynamicDetailFields" class="mb-4"></div>
        <div id="photoUploadSection" class="mb-4">
          <label class="font-medium">Photos (max 5)</label>
          <div id="photoPreviews" class="flex flex-wrap gap-2 mt-2"></div>
          <input type="file" id="photoInput" accept="image/*" class="mt-2" onchange="addPhotoFromInput()">
        </div>
        <div class="flex justify-end gap-2">
          <button onclick="closeListingForm()" class="px-4 py-2 border rounded">Cancel</button>
          <button onclick="saveListing(${isEdit ? listing.id : 'null'})" class="px-4 py-2 bg-emerald-500 text-white rounded">Save</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', formHtml);
  // Initialize photo array from existing images if editing
  window.currentPhotos = isEdit ? executeQuery("SELECT image_data FROM listing_images WHERE listing_id=? ORDER BY sort_order", [listing.id]).map(r => r.image_data) : [];
  renderPhotoPreviews();
  toggleDetailFields();
  if (isEdit) {
    // prefill detail fields based on category
    const details = JSON.parse(listing.details || '{}');
    setTimeout(() => {
      fillDetailFields(listing.category, details);
    }, 10);
  }
}

function toggleDetailFields() {
  const cat = document.getElementById('lfCategory')?.value;
  const container = document.getElementById('dynamicDetailFields');
  if (!container) return;
  let html = '';
  if (cat === 'land') {
    html = `<input id="detSize" placeholder="Size (e.g., 500 sqm)" class="w-full border p-2 rounded mb-2">
    <input id="detZoning" placeholder="Zoning" class="w-full border p-2 rounded mb-2">
    <input id="detTopography" placeholder="Topography" class="w-full border p-2 rounded mb-2">`;
  } else if (cat === 'house') {
    html = `<input id="detBedrooms" type="number" placeholder="Bedrooms" class="w-full border p-2 rounded mb-2">
    <input id="detBathrooms" type="number" placeholder="Bathrooms" class="w-full border p-2 rounded mb-2">
    <input id="detSquareFeet" placeholder="Square Feet" class="w-full border p-2 rounded mb-2">
    <input id="detYearBuilt" placeholder="Year Built" class="w-full border p-2 rounded mb-2">`;
  } else if (cat === 'estate') {
    html = `<input id="detTotalUnits" placeholder="Total Units" class="w-full border p-2 rounded mb-2">
    <input id="detAmenities" placeholder="Amenities" class="w-full border p-2 rounded mb-2">
    <input id="detTotalArea" placeholder="Total Area" class="w-full border p-2 rounded mb-2">`;
  } else if (cat === 'car') {
    html = `<input id="detMake" placeholder="Make" class="w-full border p-2 rounded mb-2">
    <input id="detModel" placeholder="Model" class="w-full border p-2 rounded mb-2">
    <input id="detYear" type="number" placeholder="Year" class="w-full border p-2 rounded mb-2">
    <input id="detMileage" placeholder="Mileage" class="w-full border p-2 rounded mb-2">
    <input id="detCondition" placeholder="Condition" class="w-full border p-2 rounded mb-2">`;
  }
  container.innerHTML = html;
}

function fillDetailFields(category, details) {
  if (category === 'land') {
    document.getElementById('detSize').value = details.size || '';
    document.getElementById('detZoning').value = details.zoning || '';
    document.getElementById('detTopography').value = details.topography || '';
  } else if (category === 'house') {
    document.getElementById('detBedrooms').value = details.bedrooms || '';
    document.getElementById('detBathrooms').value = details.bathrooms || '';
    document.getElementById('detSquareFeet').value = details.squareFeet || '';
    document.getElementById('detYearBuilt').value = details.yearBuilt || '';
  } else if (category === 'estate') {
    document.getElementById('detTotalUnits').value = details.totalUnits || '';
    document.getElementById('detAmenities').value = details.amenities || '';
    document.getElementById('detTotalArea').value = details.totalArea || '';
  } else if (category === 'car') {
    document.getElementById('detMake').value = details.make || '';
    document.getElementById('detModel').value = details.model || '';
    document.getElementById('detYear').value = details.year || '';
    document.getElementById('detMileage').value = details.mileage || '';
    document.getElementById('detCondition').value = details.condition || '';
  }
}

function addPhotoFromInput() {
  const input = document.getElementById('photoInput');
  if (!input.files || !input.files[0]) return;
  if (window.currentPhotos.length >= 5) { alert('Maximum 5 photos'); return; }
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxWidth = 800;
      let width = img.width, height = img.height;
      if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      window.currentPhotos.push(dataUrl);
      renderPhotoPreviews();
      input.value = '';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderPhotoPreviews() {
  const container = document.getElementById('photoPreviews');
  if (!container) return;
  container.innerHTML = window.currentPhotos.map((src, idx) => `
    <div class="relative w-20 h-20"><img src="${src}" class="w-full h-full object-cover rounded"><button onclick="removePhoto(${idx})" class="absolute top-0 right-0 bg-red-500 text-white rounded-full w-5 h-5 text-xs">&times;</button></div>`).join('');
}

function removePhoto(idx) {
  window.currentPhotos.splice(idx, 1);
  renderPhotoPreviews();
}

function collectDetailFields(category) {
  const details = {};
  if (category === 'land') {
    details.size = document.getElementById('detSize')?.value || '';
    details.zoning = document.getElementById('detZoning')?.value || '';
    details.topography = document.getElementById('detTopography')?.value || '';
  } else if (category === 'house') {
    details.bedrooms = document.getElementById('detBedrooms')?.value || '';
    details.bathrooms = document.getElementById('detBathrooms')?.value || '';
    details.squareFeet = document.getElementById('detSquareFeet')?.value || '';
    details.yearBuilt = document.getElementById('detYearBuilt')?.value || '';
  } else if (category === 'estate') {
    details.totalUnits = document.getElementById('detTotalUnits')?.value || '';
    details.amenities = document.getElementById('detAmenities')?.value || '';
    details.totalArea = document.getElementById('detTotalArea')?.value || '';
  } else if (category === 'car') {
    details.make = document.getElementById('detMake')?.value || '';
    details.model = document.getElementById('detModel')?.value || '';
    details.year = document.getElementById('detYear')?.value || '';
    details.mileage = document.getElementById('detMileage')?.value || '';
    details.condition = document.getElementById('detCondition')?.value || '';
  }
  return JSON.stringify(details);
}

function saveListing(id) {
  const title = document.getElementById('lfTitle').value.trim();
  const category = document.getElementById('lfCategory').value;
  const description = document.getElementById('lfDescription').value.trim();
  const price = parseFloat(document.getElementById('lfPrice').value) || 0;
  const location = document.getElementById('lfLocation').value.trim();
  const status = document.getElementById('lfStatus').value;
  const featured = document.getElementById('lfFeatured').checked ? 1 : 0;
  const details = collectDetailFields(category);
  if (!title || !location) { alert('Title and location required'); return; }

  if (id) {
    // Update
    db.run("UPDATE listings SET title=?, category=?, description=?, price=?, location=?, status=?, is_featured=?, details=? WHERE id=?",
      [title, category, description, price, location, status, featured, details, id]);
    // Replace images
    db.run("DELETE FROM listing_images WHERE listing_id=?", [id]);
    window.currentPhotos.forEach((photo, idx) => {
      db.run("INSERT INTO listing_images (listing_id, image_data, sort_order) VALUES (?,?,?)", [id, photo, idx]);
    });
  } else {
    // Insert new
    db.run("INSERT INTO listings (title, category, description, price, location, status, is_featured, details) VALUES (?,?,?,?,?,?,?,?)",
      [title, category, description, price, location, status, featured, details]);
    const newId = db.exec("SELECT last_insert_rowid()")[0].values[0][0];
    window.currentPhotos.forEach((photo, idx) => {
      db.run("INSERT INTO listing_images (listing_id, image_data, sort_order) VALUES (?,?,?)", [newId, photo, idx]);
    });
  }
  saveDatabase();
  closeListingForm();
  showAdminSection('listings'); // refresh list
}

function closeListingForm() {
  const overlay = document.getElementById('listingFormOverlay');
  if (overlay) overlay.remove();
}

function editListing(id) {
  const listing = executeQuery("SELECT * FROM listings WHERE id=?", [id])[0];
  openListingForm(listing);
}

function deleteListing(id) {
  if (confirm('Delete this listing?')) {
    db.run("DELETE FROM listings WHERE id=?", [id]);
    db.run("DELETE FROM listing_images WHERE listing_id=?", [id]);
    saveDatabase();
    showAdminSection('listings');
  }
}

function adminLogout() {
  adminLoggedIn = false;
  adminUser = null;
  loadAdminPage();
}

function exportDatabase() {
  const uint8 = db.export();
  const blob = new Blob([uint8], {type: 'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'oremaglobal.db';
  a.click();
  URL.revokeObjectURL(url);
  alert('Database exported. You can replace the file on your host if needed.');
}
